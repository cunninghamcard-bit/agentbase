app = 'agentbase-api'
primary_region = 'hkg'

[build]
  dockerfile = 'Dockerfile.fly'

[env]
  DATA_DIR = '/data'
  DB_PATH = '/data/lancedb'
  LLM_PROVIDER = 'anthropic'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  swap_size_mb = 512
