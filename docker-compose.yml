services:
  backend:
    build: ./backend
    volumes:
      - ./data:/data
    env_file:
      - path: ./.env
        required: false
      - path: ./backend/.env
        required: false
    environment:
      - DATA_DIR=/data
      - DB_PATH=/data/lancedb
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./landing
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
