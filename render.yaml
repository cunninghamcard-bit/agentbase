services:
  - type: web
    name: agentbase-api
    runtime: docker
    dockerfilePath: ./Dockerfile.fly
    region: singapore  # closest free region to China
    plan: free
    envVars:
      - key: DATA_DIR
        value: /data
      - key: DB_PATH
        value: /data/lancedb
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: kimi-latest
      - key: LLM_API_BASE
        value: https://api.kimi.com/coding/
      - key: CORS_ORIGINS
        value: https://agentbase.vercel.app,http://localhost:3000,http://localhost:3001
      - key: LLM_API_KEY
        sync: false  # set manually in dashboard
